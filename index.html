<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp URL Generator</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>WhatsApp URL Generator</h1>

    <p class="subtitle">
        Generate direct WhatsApp chat links instantly
    </p>

    <form id="whatsappForm">

        <label for="mobileNumber">
            Mobile Number
        </label>

        <input
            type="text"
            id="mobileNumber"
            placeholder="9876543210"
            maxlength="10"
            autocomplete="off">

        <span
            id="mobileNumberError"
            class="error">
        </span>

        <label for="message">
            Message (Optional)
        </label>

        <textarea
            id="message"
            rows="4"
            placeholder="Type your message here...">
        </textarea>

        <button
            type="button"
            id="generateBtn">
            Generate Link
        </button>

    </form>

    <div
        id="whatsappURLContainer"
        class="hidden result">

        <h2>Ready to Chat</h2>

        <a
            id="whatsappLogoLink"
            target="_blank"
            class="whatsapp-button">

            Open WhatsApp Chat

        </a>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
